<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON Assistant - AI Industrial Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f6ff;
            --secondary: #ff00ff;
            --accent: #00ff00;
            --dark: #0a0a0a;
            --darker: #050505;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .neon-glow {
            box-shadow:
                0 0 20px rgba(0, 246, 255, 0.3),
                0 0 40px rgba(0, 246, 255, 0.1),
                inset 0 1px 0 rgba(0, 246, 255, 0.2);
        }

        .neon-text {
            text-shadow:
                0 0 10px var(--primary),
                0 0 20px var(--primary),
                0 0 30px var(--primary);
        }

        .feature-btn {
            position: relative;
            background: transparent;
            border: 2px solid rgba(0, 255, 255, 0.3);
            color: var(--primary);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 24px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .feature-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .feature-btn:hover::before {
            left: 100%;
        }

        .feature-btn:hover {
            border-color: var(--primary);
            box-shadow:
                0 0 20px rgba(0, 255, 255, 0.5),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .feature-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow:
                0 0 25px rgba(0, 255, 0, 0.4),
                inset 0 0 25px rgba(0, 255, 0, 0.1);
        }

        .action-btn {
            background: transparent;
            border: 2px solid;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: all 0.3s ease;
            transform: translate(-50%, -50%);
        }

        .action-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn-primary { border-color: var(--primary); color: var(--primary); }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(0, 246, 255, 0.5); }

        .btn-secondary { border-color: var(--secondary); color: var(--secondary); }
        .btn-secondary:hover { box-shadow: 0 0 20px rgba(255, 0, 255, 0.5); }

        .btn-success { border-color: var(--accent); color: var(--accent); }
        .btn-success:hover { box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); }

        .btn-warning { border-color: #ffaa00; color: #ffaa00; }
        .btn-warning:hover { box-shadow: 0 0 20px rgba(255, 170, 0, 0.5); }

        .btn-danger { border-color: #ff0040; color: #ff0040; }
        .btn-danger:hover { box-shadow: 0 0 20px rgba(255, 0, 64, 0.5); }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            padding: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: rgba(224, 224, 224, 0.6);
        }

        /* Enhanced dropdown styling with colored options */
        .input-mode-select {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 10px;
            color: var(--primary);
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            background-image: linear-gradient(45deg, transparent 50%, var(--primary) 50%),
                              linear-gradient(135deg, var(--primary) 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px),
                               calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
            appearance: none;
        }

        .input-mode-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.4);
            background-color: rgba(0, 255, 255, 0.05);
        }

        .input-mode-select:hover {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.2);
        }

        /* Styled dropdown options with individual colors */
        .input-mode-select option {
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 12px;
            font-weight: 500;
            border: none;
        }

        .input-mode-select option[value="text"] {
            color: var(--primary);
            background: linear-gradient(135deg, rgba(0, 246, 255, 0.1) 0%, rgba(0, 0, 0, 0.95) 100%);
        }

        .input-mode-select option[value="speech"] {
            color: var(--secondary);
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.1) 0%, rgba(0, 0, 0, 0.95) 100%);
        }

        .input-mode-select option[value="hybrid"] {
            color: var(--accent);
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1) 0%, rgba(0, 0, 0, 0.95) 100%);
        }

        /* Additional option hover effects for supported browsers */
        .input-mode-select option:hover {
            background: rgba(0, 255, 255, 0.2) !important;
        }

        .response-area {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        /* Keep code blocks inside the box */
        .response-area pre {
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: break-word;
            overflow-x: auto;
            max-width: 100%;
        }

        .response-area code {
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .response-area p,
        .response-area div,
        .response-area strong {
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .history-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.05), transparent);
            transition: left 0.3s;
        }

        .history-item:hover::before {
            left: 100%;
        }

        .history-item:hover {
            border-color: rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-success {
            background: rgba(0, 255, 0, 0.1);
            color: var(--accent);
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .status-error {
            background: rgba(255, 0, 64, 0.1);
            color: #ff0040;
            border: 1px solid rgba(255, 0, 64, 0.3);
        }

        .status-info {
            background: rgba(0, 246, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 246, 255, 0.3);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.5);
        }

        /* Mic button styles */
        .mic-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-pulse-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid var(--secondary);
            color: var(--secondary);
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .mic-pulse-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            opacity: 0;
            animation: micRipple 2s infinite;
        }

        .mic-pulse-btn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            opacity: 0;
            animation: micRipple 2s infinite 0.6s;
        }

        @keyframes micRipple {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .mic-pulse-btn:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            transform: scale(1.05);
        }

        .mic-pulse-btn.listening {
            background: rgba(255, 0, 255, 0.2);
            border-color: #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.8);
            animation: micListenPulse 1s ease-in-out infinite;
        }

        @keyframes micListenPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 0, 255, 0.5); }
            50% { box-shadow: 0 0 60px rgba(255, 0, 255, 1); }
        }

        .mic-label {
            font-size: 13px;
            color: var(--secondary);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Input mode containers - hidden by default */
        .input-text-area { display: none; }
        .input-speech-area { display: none; }

        /* Mode-specific visibility */
        .mode-text .input-text-area { display: block; }
        .mode-speech .input-speech-area { display: flex; }
        .mode-hybrid .input-text-area { display: block; }
        .mode-hybrid .input-speech-area { display: flex; }

        /* Hybrid layout adjustments */
        .mode-hybrid .input-speech-area {
            margin-top: 16px;
            justify-content: center;
        }

        /* Input section mode colors */
        .mode-speech .input-section-title { color: var(--secondary); }
        .mode-speech .input-section-title i { color: var(--secondary); }
        .mode-hybrid .input-section-title { color: var(--accent); }
        .mode-hybrid .input-section-title i { color: var(--accent); }

        /* Hide speakBtn and stopSpeakBtn from action bar - mic in input area handles it */
        #speakBtn, #stopSpeakBtn { display: none !important; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .feature-btn {
                font-size: 20px;
                padding: 12px 16px;
            }

            .glass-card {
                margin: 10px;
                padding: 20px !important;
            }

            .input-mode-select {
                font-size: 12px;
                padding: 10px 14px;
            }

            .mic-pulse-btn {
                width: 72px;
                height: 72px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>

    <!-- Header -->
    <header class="relative z-10 px-6 py-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full flex items-center justify-center">
                        <i class="fas fa-robot text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-4xl font-bold neon-text">TRON Assistant</h1>
                        <p class="text-sm text-gray-400">AI-Powered Industrial Solution Platform</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select id="inputMode" class="input-mode-select">
                        <option value="text">📝 Text Mode</option>
                        <option value="speech">🎤 Speech Mode</option>
                        <option value="hybrid">🔄 Hybrid Mode</option>
                    </select>
                    <div class="text-right">
                        <div class="text-sm text-gray-400">System Status</div>
                        <div class="text-green-400 font-semibold">🟢 Online</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 pb-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Control Panel -->
            <div class="lg:col-span-2">
                <div class="glass-card p-8 neon-glow">

                    <!-- Feature Selection -->
                    <div class="mb-8">
                        <h2 class="text-2xl font-semibold text-cyan-400 mb-6 flex items-center">
                            <i class="fas fa-cogs mr-3"></i>
                            AI Service Modules
                        </h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            <button id="quizBtn" class="feature-btn" title="Quiz Generator">
                                <i class="fas fa-brain"></i>
                                <div class="text-xs mt-2 opacity-75">Quiz</div>
                            </button>
                            <button id="doubtBtn" class="feature-btn" title="Doubt Solver">
                                <i class="fas fa-question-circle"></i>
                                <div class="text-xs mt-2 opacity-75">Solver</div>
                            </button>
                            <button id="codeBtn" class="feature-btn" title="Code Debugger">
                                <i class="fas fa-bug"></i>
                                <div class="text-xs mt-2 opacity-75">Debug</div>
                            </button>
                            <button id="resumeBtn" class="feature-btn" title="Resume Analyzer">
                                <i class="fas fa-file-alt"></i>
                                <div class="text-xs mt-2 opacity-75">Resume</div>
                            </button>
                        </div>
                    </div>

                    <!-- Input Section -->
                    <div id="inputSection" class="mb-8 mode-text">
                        <h3 class="text-xl font-semibold text-cyan-400 mb-4 flex items-center input-section-title">
                            <i id="inputSectionIcon" class="fas fa-keyboard mr-3"></i>
                            <span id="inputSectionLabel">Input Interface</span>
                        </h3>

                        <!-- Text input (shown in text + hybrid mode) -->
                        <div class="input-text-area">
                            <textarea
                                id="queryInput"
                                class="input-field w-full h-32 resize-none"
                                placeholder="Select a service module above and enter your query..."
                            ></textarea>
                        </div>

                        <!-- Mic button (shown in speech + hybrid mode) -->
                        <div class="input-speech-area">
                            <div class="mic-btn-wrapper">
                                <button id="micBtn" class="mic-pulse-btn" title="Click to speak">
                                    <i class="fas fa-microphone"></i>
                                </button>
                                <span id="micLabel" class="mic-label">Click to Speak</span>
                            </div>
                        </div>

                        <input id="resumeFile" type="file" class="hidden" accept=".pdf,.doc,.docx">

                        <!-- Status Display -->
                        <div id="voiceStatus" class="mt-3 min-h-[24px]"></div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mb-8">
                        <h3 class="text-xl font-semibold text-cyan-400 mb-4 flex items-center">
                            <i class="fas fa-play-circle mr-3"></i>
                            Action Controls
                        </h3>
                        <div class="flex flex-wrap gap-4">
                            <button id="submitBtn" class="action-btn btn-primary">
                                <i class="fas fa-paper-plane mr-2"></i>
                                Execute
                            </button>
                            <button id="speakBtn" class="action-btn btn-secondary">
                                <i class="fas fa-microphone mr-2"></i>
                                Voice Input
                            </button>
                            <button id="stopSpeakBtn" class="action-btn btn-danger hidden">
                                <i class="fas fa-stop mr-2"></i>
                                Stop Listen
                            </button>
                            <button id="voiceBtn" class="action-btn btn-success">
                                <i class="fas fa-volume-up mr-2"></i>
                                Read Output
                            </button>
                            <button id="fileBtn" class="action-btn btn-warning hidden">
                                <i class="fas fa-upload mr-2"></i>
                                Upload File
                            </button>
                        </div>
                    </div>

                    <!-- Response Section -->
                    <div>
                        <h3 class="text-xl font-semibold text-cyan-400 mb-4 flex items-center">
                            <i class="fas fa-terminal mr-3"></i>
                            AI Response Output
                        </h3>
                        <div id="responseOutput" class="response-area">
                            <div class="text-center text-gray-400 py-8">
                                <i class="fas fa-robot text-4xl mb-4 opacity-50"></i>
                                <p>Welcome to TRON Assistant</p>
                                <p class="text-sm mt-2">Select a service module and enter your query to begin</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1">

                <!-- History Panel -->
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-cyan-400 flex items-center">
                            <i class="fas fa-history mr-2"></i>
                            Session History
                        </h3>
                        <button id="clearHistoryBtn" class="text-red-400 hover:text-red-300 transition-colors">
                            <i class="fas fa-trash text-sm"></i>
                        </button>
                    </div>
                    <div id="historyOutput" class="space-y-3 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-500 py-4">
                            <i class="fas fa-clock opacity-50 mb-2 block"></i>
                            <p class="text-sm">No session history</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = null;
        let recognition = null;
        let isListening = false;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let history = [];
        let sessionCount = 0;
        let startTime = Date.now();

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                showStatus('🎤 Listening... Speak now', 'info', true);
                const micBtn = document.getElementById('micBtn');
                const micLabel = document.getElementById('micLabel');
                if (micBtn) { micBtn.classList.add('listening'); micBtn.querySelector('i').className = 'fas fa-stop'; }
                if (micLabel) micLabel.textContent = 'Listening...';
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('queryInput').value = transcript;
                showStatus('✓ Voice captured: "' + transcript + '"', 'success');
                setTimeout(() => clearStatus(), 3000);
                // Auto-submit in pure speech mode
                const currentInputMode = document.getElementById('inputMode').value;
                if (currentInputMode === 'speech' && currentMode) {
                    setTimeout(() => document.getElementById('submitBtn').click(), 600);
                }
            };

            recognition.onerror = function(event) {
                showStatus('❌ Speech error: ' + event.error, 'error');
                resetSpeechButtons();
            };

            recognition.onend = function() {
                resetSpeechButtons();
            };
        }

        function resetSpeechButtons() {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            const micLabel = document.getElementById('micLabel');
            if (micBtn) { micBtn.classList.remove('listening'); micBtn.querySelector('i').className = 'fas fa-microphone'; }
            if (micLabel) micLabel.textContent = 'Click to Speak';
        }

        function showStatus(message, type = 'info', persistent = false) {
            const statusDiv = document.getElementById('voiceStatus');
            const statusClass = type === 'success' ? 'status-success' :
                              type === 'error' ? 'status-error' : 'status-info';

            statusDiv.innerHTML = `<div class="status-indicator ${statusClass}">${message}</div>`;

            if (!persistent) {
                setTimeout(() => clearStatus(), 5000);
            }
        }

        function clearStatus() {
            document.getElementById('voiceStatus').innerHTML = '';
        }

        // AI Response Generator
        function generateResponse(mode, query) {
            const responses = {
                quiz: {
                    default: `<div class="space-y-4">
                        <div class="border-l-4 border-cyan-400 pl-4">
                            <h4 class="text-cyan-400 font-semibold mb-2">🧠 Quiz Generation System Activated</h4>
                            <p class="mb-4">I can create comprehensive quizzes on any topic. Here's what I can generate:</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                            <div class="bg-gray-800 p-3 rounded border border-purple-700">
                                <strong class="text-purple-300">📖 Academic Support</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• Complex concept explanation</li>
                                    <li>• Step-by-step problem solving</li>
                                    <li>• Theory to practice connection</li>
                                </ul>
                            </div>
                            <div class="bg-gray-800 p-3 rounded border border-purple-700">
                                <strong class="text-purple-300">💻 Technical Help</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• Programming concepts</li>
                                    <li>• Algorithm explanations</li>
                                    <li>• Best practices guidance</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-purple-900 bg-opacity-30 rounded border border-purple-600">
                            <strong class="text-purple-300">💡 How to Use:</strong>
                            <p class="text-gray-300 mt-1">Simply describe your doubt or paste the concept you're struggling with. I'll provide clear, detailed explanations.</p>
                        </div>
                    </div>`
                },

                code: {
                    default: `<div class="space-y-4">
                        <div class="border-l-4 border-red-400 pl-4">
                            <h4 class="text-red-400 font-semibold mb-2">🐛 Code Debugging System Activated</h4>
                            <p class="mb-4">Advanced code analysis and debugging capabilities at your service:</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                            <div class="bg-gray-800 p-3 rounded border border-red-700">
                                <strong class="text-red-300">🔍 Error Detection</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• Syntax error identification</li>
                                    <li>• Logic flaw detection</li>
                                    <li>• Runtime error analysis</li>
                                </ul>
                            </div>
                            <div class="bg-gray-800 p-3 rounded border border-red-700">
                                <strong class="text-red-300">⚡ Optimization</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• Performance improvements</li>
                                    <li>• Code quality enhancement</li>
                                    <li>• Best practices implementation</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-red-900 bg-opacity-30 rounded border border-red-600">
                            <strong class="text-red-300">📝 Instructions:</strong>
                            <p class="text-gray-300 mt-1">Paste your code snippet and describe the issue. I'll analyze and provide solutions.</p>
                        </div>
                    </div>`
                },

                resume: {
                    default: `<div class="space-y-4">
                        <div class="border-l-4 border-yellow-400 pl-4">
                            <h4 class="text-yellow-400 font-semibold mb-2">📄 Resume Analysis System Ready</h4>
                            <p class="mb-4">Professional resume evaluation and improvement suggestions:</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                            <div class="bg-gray-800 p-3 rounded border border-yellow-700">
                                <strong class="text-yellow-300">🎯 Analysis Features</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• Skills gap identification</li>
                                    <li>• Format optimization</li>
                                    <li>• Content enhancement</li>
                                </ul>
                            </div>
                            <div class="bg-gray-800 p-3 rounded border border-yellow-700">
                                <strong class="text-yellow-300">📊 Scoring System</strong>
                                <ul class="mt-2 space-y-1 text-gray-300">
                                    <li>• ATS compatibility check</li>
                                    <li>• Industry alignment</li>
                                    <li>• Professional scoring</li>
                                </ul>
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-yellow-900 bg-opacity-30 rounded border border-yellow-600">
                            <strong class="text-yellow-300">📤 Upload Process:</strong>
                            <p class="text-gray-300 mt-1">Click "Upload File" button to analyze your resume (PDF, DOC, DOCX supported)</p>
                        </div>
                    </div>`
                }
            };

            // Generate appropriate response based on mode and query
            if (responses[mode]) {
                if (query.toLowerCase().includes('javascript') && mode === 'quiz') {
                    return responses[mode].javascript;
                }
                return responses[mode].default;
            }

            return `<div class="text-center text-gray-400 py-8">
                <i class="fas fa-exclamation-triangle text-4xl mb-4 text-yellow-500"></i>
                <p class="text-lg">Please select a service module first</p>
                <p class="text-sm mt-2">Choose from Quiz, Doubt Solver, Code Debugger, or Resume Analyzer</p>
            </div>`;
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Feature button selection
            const featureButtons = document.querySelectorAll('.feature-btn');
            const submitBtn = document.getElementById('submitBtn');
            const queryInput = document.getElementById('queryInput');
            const responseOutput = document.getElementById('responseOutput');
            const fileBtn = document.getElementById('fileBtn');
            const resumeFile = document.getElementById('resumeFile');
            const inputModeSelect = document.getElementById('inputMode');

            // Input mode change handler
            inputModeSelect.addEventListener('change', function() {
                applyInputMode(this.value);
            });

            function applyInputMode(selectedMode) {
                const inputSection = document.getElementById('inputSection');
                const inputSectionIcon = document.getElementById('inputSectionIcon');
                const inputSectionLabel = document.getElementById('inputSectionLabel');

                inputSection.classList.remove('mode-text', 'mode-speech', 'mode-hybrid');

                const modeConfig = {
                    text: {
                        cls: 'mode-text',
                        icon: 'fa-keyboard',
                        label: 'Input Interface',
                        placeholder: 'Select a service module above and enter your query...',
                        statusMsg: '📝 Text Mode activated'
                    },
                    speech: {
                        cls: 'mode-speech',
                        icon: 'fa-microphone',
                        label: 'Voice Input',
                        placeholder: '',
                        statusMsg: '🎤 Speech Mode — use the mic button to speak'
                    },
                    hybrid: {
                        cls: 'mode-hybrid',
                        icon: 'fa-layer-group',
                        label: 'Hybrid Input',
                        placeholder: 'Type your query or use the mic button...',
                        statusMsg: '🔄 Hybrid Mode activated'
                    }
                };

                const cfg = modeConfig[selectedMode] || modeConfig.text;
                inputSection.classList.add(cfg.cls);
                inputSectionIcon.className = 'fas ' + cfg.icon + ' mr-3';
                inputSectionLabel.textContent = cfg.label;
                if (cfg.placeholder) queryInput.placeholder = cfg.placeholder;

                showStatus(cfg.statusMsg, 'info');
                setTimeout(() => clearStatus(), 2500);
            }

            // Mic button handler
            const micBtn = document.getElementById('micBtn');
            const micLabel = document.getElementById('micLabel');

            if (micBtn) {
                micBtn.addEventListener('click', function() {
                    if (!recognition) {
                        showStatus('❌ Speech recognition not supported in this browser', 'error');
                        return;
                    }
                    if (!isListening) {
                        recognition.start();
                    } else {
                        recognition.stop();
                    }
                });
            }

            featureButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // Remove active class from all buttons
                    featureButtons.forEach(b => b.classList.remove('active'));

                    // Add active class to clicked button
                    this.classList.add('active');

                    // Set current mode
                    currentMode = this.id.replace('Btn', '');

                    // Show/hide file upload for resume
                    if (currentMode === 'resume') {
                        fileBtn.classList.remove('hidden');
                    } else {
                        fileBtn.classList.add('hidden');
                    }

                    // Update placeholder
                    const placeholders = {
                        quiz: 'Enter topic for quiz generation (e.g., "JavaScript fundamentals", "Python loops")',
                        doubt: 'Describe your doubt or paste the concept you need help with',
                        code: 'Paste your code snippet and describe the issue you\'re facing',
                        resume: 'Upload your resume file or paste resume content for analysis'
                    };

                    queryInput.placeholder = placeholders[currentMode];

                    // Show default response for selected mode
                    responseOutput.innerHTML = generateResponse(currentMode, '');

                    showStatus(`${this.title} mode activated`, 'success');
                    setTimeout(() => clearStatus(), 2000);
                });
            });

            // Submit button handler
            submitBtn.addEventListener('click', function() {
                const inputMode = inputModeSelect.value;
                // In speech-only mode, query comes from the textarea populated by speech recognition
                const query = queryInput.value.trim();

                if (!currentMode) {
                    showStatus('Please select a service module first', 'error');
                    return;
                }

                if (!query && currentMode !== 'resume') {
                    showStatus('Please enter your query', 'error');
                    return;
                }

                if (!query && currentMode === 'resume' && !window.__resumeUploaded) {
                    showStatus('Please upload a resume file (PDF/DOC/DOCX) or paste resume content first', 'error');
                    return;
                }

                // Show loading state
                this.innerHTML = '<i class="loading-spinner mr-2"></i>Processing...';
                this.disabled = true;
                showStatus('⚙️ Processing your request...', 'info', true);

                const submitButton = this;

                fetch('/api/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: currentMode, query: query, input_mode: inputMode })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        responseOutput.innerHTML = data.response;
                        addToHistory(currentMode, query, data.raw_response || '');
                        showStatus('✅ Query processed successfully', 'success');
                    } else {
                        responseOutput.innerHTML = '<div class="text-red-400 p-4">❌ ' + (data.error || 'Unknown error') + '</div>';
                        showStatus('❌ ' + (data.error || 'Error processing query'), 'error');
                    }
                    queryInput.value = '';
                    setTimeout(() => clearStatus(), 3000);
                })
                .catch(err => {
                    console.error('API error:', err);
                    responseOutput.innerHTML = '<div class="text-red-400 p-4">❌ Connection error: ' + err.message + '</div>';
                    showStatus('❌ Connection failed', 'error');
                })
                .finally(() => {
                    submitButton.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Execute';
                    submitButton.disabled = false;
                });
            });

            // Voice input button
            document.getElementById('speakBtn').addEventListener('click', function() {
                if (recognition && !isListening) {
                    recognition.start();
                } else {
                    showStatus('Speech recognition not supported', 'error');
                }
            });

            // Stop speech button
            document.getElementById('stopSpeakBtn').addEventListener('click', function() {
                if (recognition && isListening) {
                    recognition.stop();
                }
            });

            // Voice output button
            let isReading = false;

            document.getElementById('voiceBtn').addEventListener('click', function() {
                // If currently reading — stop
                if (isReading) {
                    speechSynthesis.cancel();
                    isReading = false;
                    this.innerHTML = '<i class="fas fa-volume-up mr-2"></i>Read Output';
                    this.classList.remove('btn-danger');
                    this.classList.add('btn-success');
                    clearStatus();
                    return;
                }

                const responseText = responseOutput.textContent;
                if (!responseText.trim() || responseText.includes('Welcome to TRON Assistant')) {
                    showStatus('No content to read', 'error');
                    return;
                }

                if (currentUtterance) {
                    speechSynthesis.cancel();
                }

                currentUtterance = new SpeechSynthesisUtterance(responseText);
                currentUtterance.rate = 0.8;
                currentUtterance.pitch = 1;
                currentUtterance.volume = 0.8;

                currentUtterance.onstart = () => {
                    isReading = true;
                    this.innerHTML = '<i class="fas fa-stop-circle mr-2"></i>Stop Reading';
                    this.classList.remove('btn-success');
                    this.classList.add('btn-danger');
                    showStatus('🔊 Reading response aloud... Click button to stop', 'info', true);
                };

                currentUtterance.onend = () => {
                    isReading = false;
                    this.innerHTML = '<i class="fas fa-volume-up mr-2"></i>Read Output';
                    this.classList.remove('btn-danger');
                    this.classList.add('btn-success');
                    clearStatus();
                };

                currentUtterance.onerror = () => {
                    isReading = false;
                    this.innerHTML = '<i class="fas fa-volume-up mr-2"></i>Read Output';
                    this.classList.remove('btn-danger');
                    this.classList.add('btn-success');
                    clearStatus();
                };

                speechSynthesis.speak(currentUtterance);
            });

            // File upload button
            fileBtn.addEventListener('click', function() {
                resumeFile.click();
            });

            // File input handler - actually upload the file to the backend
            resumeFile.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;

                showStatus(`⬆️ Uploading "${file.name}"...`, 'info', true);

                const formData = new FormData();
                formData.append('file', file);

                fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        showStatus(`✅ "${file.name}" uploaded and processed. Click Execute to analyze.`, 'success');
                        // Clear the textarea so the backend uses the uploaded resume content
                        queryInput.value = '';
                        queryInput.placeholder = `Resume "${file.name}" loaded. Click Execute to analyze, or type extra instructions here.`;
                        window.__resumeUploaded = true;
                    } else {
                        showStatus('❌ ' + (data.message || data.error || 'Upload failed'), 'error');
                    }
                    setTimeout(() => clearStatus(), 4000);
                })
                .catch(err => {
                    console.error('Upload error:', err);
                    showStatus('❌ Upload failed: ' + err.message, 'error');
                });

                // Reset the input so the same file can be re-selected if needed
                this.value = '';
            });

            // Clear history button
            document.getElementById('clearHistoryBtn').addEventListener('click', function() {
                history = [];
                updateHistoryDisplay();
                showStatus('History cleared', 'info');
                setTimeout(() => clearStatus(), 2000);
            });

            // Initialize history display
            updateHistoryDisplay();
        });

        function addToHistory(mode, query, response) {
            const historyItem = {
                mode: mode,
                query: query.substring(0, 50) + (query.length > 50 ? '...' : ''),
                timestamp: new Date().toLocaleTimeString(),
                fullResponse: response
            };

            history.unshift(historyItem);
            if (history.length > 10) {
                history.pop();
            }

            sessionCount++;

            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const historyOutput = document.getElementById('historyOutput');

            if (history.length === 0) {
                historyOutput.innerHTML = `
                    <div class="text-center text-gray-500 py-4">
                        <i class="fas fa-clock opacity-50 mb-2 block"></i>
                        <p class="text-sm">No session history</p>
                    </div>
                `;
                return;
            }

            historyOutput.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadHistoryItem('${item.mode}', '${item.query}')">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs text-cyan-400 font-semibold uppercase">${item.mode}</span>
                        <span class="text-xs text-gray-500">${item.timestamp}</span>
                    </div>
                    <p class="text-sm text-gray-300">${item.query}</p>
                </div>
            `).join('');
        }

        function loadHistoryItem(mode, query) {
            document.getElementById('queryInput').value = query;

            // Activate the corresponding mode button
            const modeBtn = document.getElementById(mode + 'Btn');
            if (modeBtn) {
                modeBtn.click();
            }

            showStatus(`Loaded previous ${mode} query`, 'info');
            setTimeout(() => clearStatus(), 2000);
        }
    </script>
</body>
</html>
